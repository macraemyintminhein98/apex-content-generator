<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 Niche Content AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 768px; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="container bg-white p-8 rounded-lg shadow-lg w-full">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">Generate Content Ideas for Your Niche!</h1>
        <p class="text-center text-gray-600 mb-8">Struggling with what to post? Get 5 unique article ideas, headlines, and intros instantly.</p>
        
        <form id="ideaForm" class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords (1-2, e.g., "HVAC repair", "local bakery")</label>
                <input type="text" id="keywords" name="keywords" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="e.g., 'plumbing tips', 'pizza marketing'" required>
            </div>
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Generate Ideas
            </button>
        </form>

        <div id="results" class="mt-8 hidden">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Your Content Ideas:</h2>
            <div id="output" class="space-y-4 text-gray-700 bg-gray-50 p-4 rounded-md border border-gray-200">
                <!-- AI generated content will go here -->
                Loading...
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">Powered by AI. One-time payment for instant access!</p>
            <button id="buyButton" class="mt-4 py-2 px-6 bg-green-500 text-white font-semibold rounded-lg shadow-md hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">Buy Now - $9.99</button>
        </div>
    </div>

    <script>
      // Placeholder for actual API call and Stripe integration
      document.getElementById('ideaForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const keywords = document.getElementById('keywords').value;
          const resultsDiv = document.getElementById('results');
          const outputDiv = document.getElementById('output');
          resultsDiv.classList.remove('hidden');
          outputDiv.innerHTML = '<p class="text-center">Generating amazing ideas... please wait!</p>';
          
          // Simulate API call
          setTimeout(() => {
              outputDiv.innerHTML = `
                  <p class='font-bold'>1. How to Handle Common ${keywords} Emergencies</p>
                  <p class='italic mb-2'>Intro: Don't panic when a ${keywords} issue strikes! This guide helps you identify and mitigate common problems before they escalate.</p>
                  <p class='font-bold'>2. The Ultimate Guide to Choosing the Best ${keywords} for Your Business</p>
                  <p class='italic mb-2'>Intro: Selecting the right ${keywords} can make or break your operations. Learn what to look for to ensure peak performance.</p>
                  <p class='font-bold'>3. DIY ${keywords} Maintenance Tips to Save You Money</p>
                  <p class='italic mb-2'>Intro: Regular upkeep of your ${keywords} system doesn't have to be expensive. Discover simple steps you can take yourself.</p>
                  <p class='font-bold'>4. Why Your ${keywords} Isn't Working: Common Issues & Fixes</p>
                  <p class='italic mb-2'>Intro: Facing a stubborn ${keywords} problem? We break down the most frequent culprits and offer solutions you can try.</p>
                  <p class='font-bold'>5. The Future of ${keywords} Technology: What's Next?</p>
                  <p class='italic mb-2'>Intro: Staying ahead in the ${keywords} industry means understanding emerging trends. Explore the innovations shaping tomorrow.</p>
              `;
          }, 3000);
      });

      document.getElementById('buyButton').addEventListener('click', () => {
          alert('Stripe Checkout integration would go here!'); 
      });
    </script>
</body>
</html>
