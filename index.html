<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Apex Content Ideas</title><meta name="description" content="Generate SEO-friendly content ideas in a flash."><meta name="keywords" content="AI, content, ideas, SEO, generator, marketing"><style>body{font-family:sans-serif;margin:20px;background-color:#f8f9fa;color:#343a40}h1,h2{color:#007bff}main{max-width:600px;margin:20px auto;padding:20px;background-color:#fff;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,.1)}label{display:block;margin-bottom:8px;font-weight:bold}input[type="text"]{width:calc(100% - 20px);padding:10px;margin-bottom:20px;border:1px solid #ced4da;border-radius:4px}button{background-color:#28a745;color:white;padding:10px 15px;border:none;border-radius:4px;cursor:pointer;font-size:16px}button:hover{background-color:#218838}#results{margin-top:20px;border-top:1px solid #eee;padding-top:20px}.idea{margin-bottom:15px;padding:10px;background-color:#e9f7ef;border-left:4px solid #28a745;border-radius:4px}p{margin:0}</style></head><body><main><h1>Apex Content Ideas</h1><p>Generate 10 unique, SEO-friendly content ideas instantly. Just enter your niche or keyword below!</p><label for="keyword">Enter Niche/Keyword:</label><input type="text" id="keyword" placeholder="e.g., sustainable gardening, indie games, vegan baking"><button onclick="generateIdeas()">Get Ideas</button><div id="results"></div></main><script>function generateIdeas(){const keyword=document.getElementById('keyword').value;const resultsDiv=document.getElementById('results');resultsDiv.innerHTML='<p>Generating ideas...</p>';fetch('/api/generate-ideas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:keyword})}).then(response=>response.json()).then(data=>{if(data.ideas){resultsDiv.innerHTML='';data.ideas.forEach(idea=>{resultsDiv.innerHTML+=`<div class="idea"><h3>${idea.title||'No Title'}</h3><p>${idea.description||'No description provided.'}</p></div>`;})}else{resultsDiv.innerHTML='<p>Error: Could not generate ideas. Please try again.</p>';}}).catch(error=>{console.error('Error:',error);resultsDiv.innerHTML='<p>An error occurred. Please try again later.</p>';});}</script></body></html>
